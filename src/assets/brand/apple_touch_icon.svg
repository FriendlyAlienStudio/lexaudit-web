<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" fill="#1a1a1a"/>
  <!-- LexAudit Apple Touch Icon - Hollow Node Geometry -->
  <g transform="translate(90, 90) scale(2.2) translate(-10, -38)">
    <!-- Line segments broken to stop at circle boundaries -->
    <line x1="10" y1="8.5" x2="10" y2="45.5" stroke="white" stroke-width="1.5"/>
    <line x1="10" y1="54.5" x2="10" y2="63.5" stroke="white" stroke-width="1.5"/>
    
    <circle cx="10" cy="6" r="2.5" fill="white"/> <!-- Asset (solid) -->
    <circle cx="10" cy="50" r="4.5" fill="none" stroke="white" stroke-width="1.5"/> <!-- Relationship (hollow) -->
    <circle cx="10" cy="70" r="6.5" fill="none" stroke="white" stroke-width="1.5"/> <!-- Lifecycle (hollow) -->
  </g>
</svg>